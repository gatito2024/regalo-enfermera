<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atardecer de Tulipanes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="experience" aria-label="Atardecer de Tulipanes">
    <canvas id="sunsetCanvas" aria-hidden="true"></canvas>

    <section class="letter-scene" id="letterScene" aria-live="polite">
      <div class="floating-love" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="neon-box" id="neonBox">
        <p class="scene-kicker"></p>
        <div class="letter-line" id="letterLine" aria-label="Feliz Dia mi enfermera favorita"></div>
        <p class="worker-message" id="workerMessage">
          Feliz D&iacute;a del Trabajador,<br>
          mi amor
        </p>
      </div>
    </section>

    <section class="poem-card" aria-live="polite">
      <p class="template-name"></p>
      <h1 id="poemLine">Feliz D&iacute;a del Trabajador, mi amor.</h1>
      <p class="dedication">Para mi Amorshita Hermosa</p>
    </section>

    <div class="nurse-wrap" aria-hidden="true">
      <img src="imagenes/enfermera.png" class="nurse" alt="">
    </div>

    <section class="final-card" id="finalCard" aria-live="polite">
      <h2 class="final-lines">
        <span>Gracias por cuidar vidas...</span>
        <span>y por llenar la m&iacute;a de amor</span>
        <span>Estoy muy orgulloso de ti.</span>
        <span class="final-emphasis">Te amo mucho</span>
      </h2>
      <p>Con amor, Gatito</p>
    </section>

    <div class="hint" aria-hidden="true">Mueve suavemente el dedo o mouse</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
